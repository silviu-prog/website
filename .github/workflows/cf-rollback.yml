name: CF Pages Rollback

# Recovery helper for the "yeshua" Cloudflare Pages project.
#  - With ROLLBACK_TO empty  -> only lists deployments (read-only, safe).
#  - With ROLLBACK_TO set     -> rolls production back to that deployment id.
# Edit the ROLLBACK_TO value below and push to run.

on:
  push:
    branches:
      - claude/laughing-planck-Aousf
  workflow_dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CF_ACCOUNT: 6d4b96f60e99de96b3ee3006f323bbcd
      CF_PROJECT: yeshua
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ROLLBACK_TO: "28eb3965-b1f2-431c-adbf-76ca0fb83aeb"   # pre-order version (2026-05-28)
    steps:
      - name: List recent deployments
        run: |
          set -uo pipefail
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/$CF_PROJECT/deployments?per_page=25" \
            > deployments.json
          echo "── API status ──"
          jq '{success, errors, messages, result_count: (.result | length)}' deployments.json
          echo ""
          echo "── Deployments (newest first) ──"
          jq -r '.result[]? | "\(.created_on)  env=\(.environment)  id=\(.id)  url=\(.url)"' deployments.json
          echo ""
          echo "── Current production (canonical) deployment ──"
          curl -s -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/$CF_PROJECT" \
            | jq '{success, errors, canonical: (.result.canonical_deployment | {created_on, id, url})}'

      - name: Roll back production
        if: env.ROLLBACK_TO != ''
        run: |
          set -euo pipefail
          echo "Rolling back production to deployment: $ROLLBACK_TO"
          curl -s -X POST -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/$CF_PROJECT/deployments/$ROLLBACK_TO/rollback" \
            | jq '{success, errors, messages, result: {id: .result.id, environment: .result.environment, url: .result.url, created_on: .result.created_on}}'
