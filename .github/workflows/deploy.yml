name: Deploy to Cloudflare Pages

# Deploys the PRE-ORDER site to the "yeshua" Cloudflare Pages project on every
# push to the development branch.
#
# During the pre-order phase we publish ONLY index.html (a self-contained page
# that uses MailerLite for sign-ups — no backend needed). The sale version
# (index-sale.html) and the orders system (checkout.html, admin.html,
# _worker.js, schema.sql) are kept in the repo for launch but NOT deployed yet.

on:
  push:
    branches:
      - claude/laughing-planck-Aousf
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble public assets (pre-order)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Pre-order homepage only (self-contained, images embedded).
          cp index.html dist/
          echo "── Files to deploy ──"
          ls -la dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 6d4b96f60e99de96b3ee3006f323bbcd
          command: pages deploy dist --project-name=yeshua --branch=main
